{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100 mt-10 text-center">
    <h2 class="text-3xl font-bold text-blue-600 mb-4">Verify Identity</h2>
    <p class="text-gray-600 mb-6">We've sent a 4-digit code. Check your terminal output!</p>
    
    <form method="POST" class="space-y-6">
        <div>
            <input type="text" name="otp" maxlength="4" required placeholder="XXXX" class="text-center text-2xl tracking-[1em] block w-full rounded-md border-gray-300 shadow-sm border p-4 focus:ring-blue-500 focus:border-blue-500">
        </div>
        
        <button type="submit" class="w-full py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 transition">
            Verify Code
        </button>
    </form>
</div>
{% endblock %}
