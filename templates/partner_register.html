{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100 mt-10">
    <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">Become a Partner</h2>
    <p class="text-center text-gray-500 mb-8">Register as a driver, list your vehicle, or both.</p>

    <form action="/be-partner" method="POST" enctype="multipart/form-data" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="tel" name="phone" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">How would you like to join?</label>
            <select name="partner_type" id="partner_type" required onchange="toggleFields()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 bg-gray-50">
                <option value="" disabled selected>Select an option...</option>
                <option value="driver_only">I only want to be a Driver</option>
                <option value="vehicle_only">I only want to list my Vehicle</option>
                <option value="both">Both (Driver + Vehicle)</option>
            </select>
        </div>

        <div id="driver_fields" class="space-y-6 hidden p-4 bg-blue-50 rounded-lg border border-blue-100">
            <h3 class="text-lg font-semibold text-blue-800">Driver Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Driving Skill</label>
                    <select name="driving_skill" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Expert">Expert</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Experience (Years)</label>
                    <input type="number" name="experience_years" min="0" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Transmission</label>
                    <select name="transmission_preference" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                        <option value="Automatic">Automatic</option>
                        <option value="Manual">Manual</option>
                        <option value="Both">Both</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="vehicle_image_section" class="p-4 bg-purple-50 rounded-lg border border-purple-100 hidden">
         <h3 class="text-lg font-semibold text-purple-800 mb-2">Upload Vehicle Image</h3>
         <p class="text-xs text-purple-600 mb-4">Show off your ride to attract more bookings (Max 5MB).</p>
         <input type="file" name="vehicle_image" accept="image/png, image/jpeg, image/jpg" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700">
     </div>

        <div class="p-4 bg-green-50 rounded-lg border border-green-100">
            <h3 class="text-lg font-semibold text-green-800 mb-4">Set Your Rates</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Expected Hourly Rate (₹)</label>
                    <input type="number" step="0.01" name="hourly_rate" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Expected Daily Rate (₹)</label>
                    <input type="number" step="0.01" name="daily_rate" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
                </div>
            </div>
        </div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition">
            Submit Registration
        </button>
    </form>
</div>

<script>
    function toggleFields() {
        const partnerType = document.getElementById('partner_type').value;
        const driverFields = document.getElementById('driver_fields');
        const imageFields = document.getElementById('vehicle_image_section');

        // Show Driver fields
        if (partnerType === 'driver_only' || partnerType === 'both') {
            driverFields.classList.remove('hidden');
        } else {
            driverFields.classList.add('hidden');
        }

        // Show Vehicle Image fields
        if (partnerType === 'vehicle_only' || partnerType === 'both') {
            imageFields.classList.remove('hidden');
        } else {
            imageFields.classList.add('hidden');
        }
    }
</script>
{% endblock %}
