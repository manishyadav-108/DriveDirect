{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100 mt-10">
    <h2 class="text-3xl font-bold text-center text-blue-600 mb-6">Welcome Back</h2>
    
    <form action="/login" method="POST" class="space-y-6">
        
        <div>
            <label for="email" class="block text-sm font-medium text-slate-700">Email Address</label>
            <input type="email" id="email" name="email" required 
                   class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
            <input type="password" id="password" name="password" required 
                   class="w-full mt-1 p-3 border border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>

        <button type="submit" 
                class="w-full bg-slate-900 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:bg-blue-600 hover:shadow-lg transition-all duration-300 mt-4">
            Log In
        </button>
        
    </form>
    <p class="text-center mt-4 text-sm text-gray-600">
        Don't have an account? <a href="/signup" class="text-blue-600 font-semibold hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}
